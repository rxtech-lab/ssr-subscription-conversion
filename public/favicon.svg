<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f172a"/>

  <!-- Outer ring accent -->
  <circle cx="32" cy="32" r="30" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Center node -->
  <circle cx="32" cy="32" r="6" fill="#6366f1"/>

  <!-- Top-left node -->
  <circle cx="14" cy="20" r="4.5" fill="#818cf8"/>

  <!-- Top-right node -->
  <circle cx="50" cy="20" r="4.5" fill="#818cf8"/>

  <!-- Bottom node -->
  <circle cx="32" cy="51" r="4.5" fill="#818cf8"/>

  <!-- Connecting lines (spokes) -->
  <line x1="18" y1="22" x2="27" y2="28.5" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="22" x2="37" y2="28.5" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="38" x2="32" y2="46.5" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>

  <!-- Conversion arrows (curved, going around the center) -->
  <!-- Top arc arrow: top-left → top-right -->
  <path d="M18.5 17 Q32 9 45.5 17" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polygon points="45.5,17 41,14.5 43,19.5" fill="#a5b4fc"/>

  <!-- Right arc arrow: top-right → bottom -->
  <path d="M53 24 Q59 37 49.5 48" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polygon points="49.5,48 52,43.5 47,43.5" fill="#a5b4fc"/>

  <!-- Left arc arrow: bottom → top-left -->
  <path d="M27.5 51.5 Q10 46 11 23.5" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" fill="none"/>
  <polygon points="11,23.5 8,28.5 14.5,27.5" fill="#a5b4fc"/>
</svg>
